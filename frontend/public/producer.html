<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>radioGAGA Producer Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
    h1 { color: #d4a017; font-size: 1.4em; margin-bottom: 10px; }
    h2 { color: #d4a017; font-size: 1.1em; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .login { max-width: 300px; margin: 100px auto; text-align: center; }
    .login input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 10px; width: 100%; margin: 10px 0; font-family: inherit; }
    .login button, .btn { background: #d4a017; color: #0a0a0a; border: none; padding: 8px 16px; cursor: pointer; font-family: inherit; font-weight: bold; }
    .btn:hover { background: #e8b82a; }
    .btn-danger { background: #a03030; color: #fff; }
    .btn-small { padding: 4px 10px; font-size: 0.85em; }
    .status { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat { background: #1a1a1a; padding: 12px 16px; border: 1px solid #333; min-width: 150px; }
    .stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; }
    .stat-value { font-size: 1.3em; color: #d4a017; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th { text-align: left; padding: 8px 6px; background: #1a1a1a; color: #d4a017; border-bottom: 2px solid #333; position: sticky; top: 0; }
    td { padding: 6px; border-bottom: 1px solid #222; }
    tr:hover { background: #1a1a0a; }
    td input, td select { background: #111; color: #e0e0e0; border: 1px solid #333; padding: 3px 5px; font-family: inherit; font-size: 0.9em; width: 100%; }
    td input:focus, td select:focus { border-color: #d4a017; outline: none; }
    td input[type="number"] { width: 60px; }
    .current-show { border-left: 3px solid #d4a017; }
    .yaml-editor { width: 100%; min-height: 400px; background: #111; color: #e0e0e0; border: 1px solid #333; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; resize: vertical; }
    .actions { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1a3a1a; border: 1px solid #2a5a2a; color: #7f7; padding: 12px 20px; display: none; z-index: 100; }
    .toast.error { background: #3a1a1a; border-color: #5a2a2a; color: #f77; }
    .tabs { display: flex; gap: 2px; margin-bottom: 15px; }
    .tab { padding: 8px 16px; background: #1a1a1a; cursor: pointer; border: 1px solid #333; }
    .tab.active { background: #333; color: #d4a017; border-bottom-color: #333; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #refresh-timer { color: #666; font-size: 0.8em; }
  </style>
</head>
<body>

<div id="login-screen" class="login">
  <h1>radioGAGA</h1>
  <p style="color:#888; margin-bottom:15px">Producer Dashboard</p>
  <input type="password" id="password" placeholder="Password" autofocus>
  <button onclick="login()">Enter</button>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center">
    <h1>radioGAGA Producer Dashboard</h1>
    <span id="refresh-timer"></span>
  </div>

  <div class="status" id="status-bar"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('schedule')">Schedule</div>
    <div class="tab" onclick="switchTab('yaml')">YAML Editor</div>
    <div class="tab" onclick="switchTab('history')">History</div>
  </div>

  <div id="tab-schedule" class="tab-content active">
    <div class="actions">
      <button class="btn" onclick="saveSchedule()">Save Schedule</button>
      <button class="btn btn-danger" onclick="restartStation()">Restart Station</button>
    </div>
    <div style="overflow-x:auto">
      <table id="schedule-table">
        <thead>
          <tr>
            <th>Hour</th>
            <th>Show</th>
            <th>Presenter</th>
            <th>Co-Host</th>
            <th>Energy</th>
            <th>Talk%</th>
            <th>Humor</th>
            <th>Music Mood</th>
            <th>Ads/N</th>
            <th>Guests/N</th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-yaml" class="tab-content">
    <div class="actions">
      <button class="btn" onclick="saveYaml()">Save YAML</button>
      <button class="btn btn-small" onclick="loadYaml()">Reload from Server</button>
    </div>
    <textarea id="yaml-editor" class="yaml-editor"></textarea>
  </div>

  <div id="tab-history" class="tab-content">
    <table>
      <thead><tr><th>Time</th><th>Type</th><th>Title</th></tr></thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN = '';
let refreshInterval;

function login() {
  TOKEN = document.getElementById('password').value;
  fetch('/api/dashboard', { headers: { Authorization: `Bearer ${TOKEN}` } })
    .then(r => { if (!r.ok) throw new Error('Wrong password'); return r.json(); })
    .then(data => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard(data);
      refreshInterval = setInterval(refreshDashboard, 15000);
    })
    .catch(e => toast(e.message, true));
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-content#tab-${name}`).classList.add('active');
  event.target.classList.add('active');
  if (name === 'yaml') loadYaml();
  if (name === 'history') loadHistory();
}

function renderDashboard(data) {
  // Status bar
  const s = data.currentShow;
  document.getElementById('status-bar').innerHTML = `
    <div class="stat"><div class="stat-label">Now Playing</div><div class="stat-value">${s.name}</div></div>
    <div class="stat"><div class="stat-label">Presenter</div><div class="stat-value">${s.presenter}</div></div>
    <div class="stat"><div class="stat-label">Energy</div><div class="stat-value">${s.energy}/5</div></div>
    <div class="stat"><div class="stat-label">Talk Ratio</div><div class="stat-value">${Math.round(s.talkRatio * 100)}%</div></div>
    <div class="stat"><div class="stat-label">Queue</div><div class="stat-value">${data.queueSize}</div></div>
    <div class="stat"><div class="stat-label">Archive Pool</div><div class="stat-value">${data.archivePool}</div></div>
    <div class="stat"><div class="stat-label">Ad Catalog</div><div class="stat-value">${data.catalog?.total || 0}</div></div>
  `;

  // Schedule table
  const tbody = document.getElementById('schedule-body');
  tbody.innerHTML = '';
  for (const show of data.schedule) {
    const isCurrent = show.id === s.id;
    const hr = show.hours[0];
    const endHr = show.hours[show.hours.length - 1] + 1;
    const tr = document.createElement('tr');
    if (isCurrent) tr.classList.add('current-show');
    tr.dataset.id = show.id;
    tr.innerHTML = `
      <td>${String(hr).padStart(2,'0')}:00–${String(endHr).padStart(2,'0')}:00</td>
      <td><input value="${show.name}" data-field="name"></td>
      <td><input value="${show.presenter}" data-field="presenter"></td>
      <td><input value="${show.coHost || ''}" data-field="coHost"></td>
      <td><input type="number" min="1" max="5" value="${show.energy}" data-field="energy"></td>
      <td><input type="number" min="0" max="100" value="${Math.round(show.talkRatio * 100)}" data-field="talkRatio">%</td>
      <td><select data-field="humor">
        <option ${show.humor==='light'?'selected':''}>light</option>
        <option ${show.humor==='dry'?'selected':''}>dry</option>
        <option ${show.humor==='dark'?'selected':''}>dark</option>
        <option ${show.humor==='absurd'?'selected':''}>absurd</option>
      </select></td>
      <td><input value="${show.musicMood || ''}" data-field="musicMood" style="min-width:200px"></td>
      <td><input type="number" min="1" max="20" value="${show.advertFrequency || 4}" data-field="adFreq" style="width:50px"></td>
      <td><input type="number" min="0" max="10" value="${show.guestFrequency || 0}" data-field="guestFreq" style="width:50px"></td>
    `;
    tbody.appendChild(tr);
  }
}

async function refreshDashboard() {
  try {
    const r = await fetch('/api/dashboard', { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (r.ok) {
      const data = await r.json();
      renderDashboard(data);
      document.getElementById('refresh-timer').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    }
  } catch {}
}

async function loadYaml() {
  const r = await fetch('/api/schedule', { headers: { Authorization: `Bearer ${TOKEN}` } });
  if (r.ok) document.getElementById('yaml-editor').value = await r.text();
}

async function saveYaml() {
  const yamlText = document.getElementById('yaml-editor').value;
  const r = await fetch('/api/schedule', {
    method: 'PUT',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'text/yaml' },
    body: yamlText,
  });
  const data = await r.json();
  toast(data.ok ? 'Schedule saved! Restart to apply.' : data.error, !data.ok);
}

async function saveSchedule() {
  // For now, redirect to YAML editor — full grid-to-yaml conversion is complex
  toast('Use the YAML Editor tab for full editing. Grid view is read-only for now.', false);
  switchTab('yaml');
  await loadYaml();
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history?limit=100');
    if (r.ok) {
      const items = await r.json();
      document.getElementById('history-body').innerHTML = items.map(h =>
        `<tr><td>${new Date(h.played_at).toLocaleTimeString()}</td><td>${h.type}</td><td>${h.title || ''}</td></tr>`
      ).join('');
    }
  } catch {}
}

async function restartStation() {
  if (!confirm('Restart the station? Stream will briefly drop.')) return;
  const r = await fetch('/api/restart', { method: 'POST', headers: { Authorization: `Bearer ${TOKEN}` } });
  const data = await r.json();
  toast(data.message);
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
