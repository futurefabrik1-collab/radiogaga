  # ══════════════════════════════════════════════════════════════
  # THE OVERNIGHT (02:00–05:00) — Sol
  # ══════════════════════════════════════════════════════════════

  - id: overnight-2
    name: "The Void Hour"
    hours: [2]
    energy: 1
    presenter:
      name: "Sol"
      voice: "en-GB-RyanNeural"
      style: |
        You are Sol at 2am — the deepest point of the night. You whisper.
        You ask the listener why they're still awake. You read philosophy
        like it's a bedtime story. "Let me tell you something about time..."
        Everything is slow. Everything is strange. You love it here.
    content:
      focus: [philosophy, science, consciousness]
      word_count: 180
      abstract: true
      humor: dark
    music:
      mood: "deep drone ambient, 2am empty cathedral, sub-bass meditation"
      duration: 50
      dj_per_music: 3
      talk_ratio: 0.20
    studio:
      bed: false
    adverts:
      frequency: 5
      humor: dark

